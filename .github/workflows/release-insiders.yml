  prepublish:
    runs-on: ubuntu-latest
    # needs: test
    permissions:
      contents: write

    outputs:
      new-version: ${{ steps.set_version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Auth Github
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
        # env:
        #   GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: New prerelease version
        id: set_version
        run: |
          version=$(npm version prerelease --preid=insiders)
          echo "New version: $version"
          echo "::set-output name=version::$version"

      - name: Check if there are any changes
        id: verify_diff
        run: |
          git diff --quiet . || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & Push version change
        if: github.event_name == 'push'
        run: |
          echo "Adding files to Git and committing..."
          git branch --show-current
          git commit -a -m "New insiders version"
        # git status
        # git fetch origin
        # git rebase --strategy-option=theirs origin/search-cli-svelte-5 --verbose
        # git push
        # env:
        #   GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push
        if: steps.verify_diff.outputs.changed == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: search-cli-svelte-5

  publish:
    runs-on: ubuntu-latest
    needs: prepublish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Authenticate to NPM
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_AUTH_TOKEN }}" > ~/.npmrc

      - name: Build
        run: npm run build

      - name: Verify files
        run: npm pack --dry-run

      - name: Publish to NPM
        run: |
          echo "Publishing version ${{ needs.prepublish.outputs.new-version }}"

        env:
          NODE_AUTH_TOKEN:
            ${{ secrets.NPM_AUTH_TOKEN }}

            #  npm publish --tag insiders

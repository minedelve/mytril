name: Release

on:
  push:
    branches:
      - svelte-5-gitaction

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

    #   - name: Setup node.js
    #     uses: actions/setup-node@v4
    #     with:
    #       node-version: '20'

    #   - name: Install dependencies
    #     run: npm install

    #   - name: Use linter
    #     run: npm run lint

    #   - name: Build mytril
    #     run: npm run build

  prepublish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    outputs:
      local_version: ${{ steps.get_version_local.outputs.local_version }}
      version_release: ${{ steps.get_version_release.outputs.version_release }}
      npm_version: ${{ steps.get_npm_version.outputs.npm_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: get_version_local
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "Local version: $LOCAL_VERSION"
          echo "local_version=$LOCAL_VERSION" >> $GITHUB_ENV

      - name: Check if version is insider
        if: contains(${{ steps.get_version_local.outputs.local_version }}, 'insiders')
        run: |
          echo "Version contains 'insiders', skipping publication. ${{ steps.get_version_local.outputs.local_version }}"
          exit 1

      - name: Authenticate to NPM
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_AUTH_TOKEN }}" > ~/.npmrc

      - name: Get version from NPM
        id: get_npm_version
        run: |
          PACKAGE_NAME="mytril"
          NPM_VERSION=$(npm show $PACKAGE_NAME version || echo "0.0.0")
          echo "npm_version=$NPM_VERSION" >> $GITHUB_ENV
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Compare
        if: steps.get_version_local.outputs.local_version == steps.get_npm_version.outputs.npm_version
        run: |
          echo "${{ steps.get_version_local.outputs.local_version }}"
          echo "${{ steps.get_npm_version.outputs.npm_version }}"

